  <body class="cv-site" data-page="home">
    <!-- =========================================================
      MOUNT · NAVIGATION
    ========================================================== -->
    <div data-fragment="navigation"></div>

    <!-- =========================================================
      DATA · PUBLIC CV HUB
    ========================================================== -->
    <main class="cv-main" id="main-content">
      <section class="cv-page cv-page--hero" id="profile" aria-label="Profile introduction">
        <section class="cv-hero" aria-labelledby="cv-title" data-cv-section="hero"></section>
      </section>

      <section class="cv-page cv-page--focus" id="focus" aria-label="Professional focus">
        <section class="cv-section cv-section--focus" data-cv-section="focus">
          <div class="cv-grid cv-grid--focus" data-cv-list="focus"></div>
        </section>
      </section>

      <section class="cv-page cv-page--work" id="work" aria-label="Selected work">
        <section class="cv-section cv-section--work" data-cv-section="work">
          <div data-cv-list="projects"></div>
        </section>
      </section>

      <section class="cv-page cv-page--details" id="details" aria-label="Professional details">
        <section class="cv-section cv-section--details" data-cv-section="details">
          <div class="cv-detail-strip" data-cv-list="detail-triggers"></div>
        </section>

        <div data-fragment="footer"></div>
      </section>

    </main>

    <!-- =========================================================
      MOUNT · DETAIL OVERLAY
    ========================================================== -->
    <section class="cv-detail-overlay" data-cv-detail-overlay hidden aria-hidden="true">
      <article class="cv-detail-overlay__panel" role="dialog" aria-modal="true" aria-label="CV detail panel">
        <button class="global-close-button" type="button" aria-label="Close detail panel" data-cv-detail-close>
          <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
          <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
        </button>
        <div class="cv-detail-overlay__content" data-cv-detail-content></div>
      </article>
    </section>

  </body>
