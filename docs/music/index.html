<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
      ARTAN.LIVE · MUSIC
      File: docs/music/index.html
      Purpose: JSON-driven public music archive page.
    ========================================================== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Music releases, albums, production work, and listening links by Artan." />
    <meta name="theme-color" content="#f7f7f5" />

    <meta property="og:title" content="Artan · Music" />
    <meta property="og:description" content="Music releases, albums, production work, and listening links by Artan." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artan.live/music/" />

    <title>Artan · Music</title>

    <link rel="canonical" href="https://artan.live/music/" />
    <link rel="icon" href="../assets/brand/logo/symbol-artan.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../assets/brand/logo/symbol-artan.svg" />
    <link rel="stylesheet" href="../assets/css/core/00-orchestrator/style.css" />
    <script src="../assets/js/core/app.js" type="module" defer></script>
  </head>

  <body class="cv-site" data-page="music">
    <div data-fragment="navigation"></div>

    <main class="cv-main" id="main-content">
      <!-- =========================================================
        ARTICLE SHELL
      ========================================================== -->
      <section class="cv-page cv-page--article" aria-labelledby="page-title">
        <article class="cv-article" data-music-root>
          <header class="cv-article__header">
            <h1 class="cv-title" id="page-title" data-music-page-title>Music</h1>
          </header>

          <section class="cv-publication-controls" aria-label="Music controls">
            <div class="cv-publication-tabs" aria-label="Music release category">
              <button class="cv-publication-tabs__button" type="button" data-music-category="albums" aria-pressed="false">Albums</button>
              <button class="cv-publication-tabs__button" type="button" data-music-category="singles" aria-pressed="true">Singles</button>
              <button class="cv-publication-tabs__button" type="button" data-music-category="eps" aria-pressed="false">EPs</button>
            </div>

            <div class="cv-publication-filter" aria-label="Music status filter">
              <span class="cv-publication-filter__icon" aria-hidden="true"></span>
              <button class="cv-publication-filter__button" type="button" data-music-filter="all" aria-pressed="true">All</button>
              <button class="cv-publication-filter__button" type="button" data-music-filter="released" aria-pressed="false">Released</button>
              <button class="cv-publication-filter__button" type="button" data-music-filter="upcoming" aria-pressed="false">Upcoming</button>
            </div>
          </section>

          <div class="cv-article__body" data-music-sections></div>
        </article>
      </section>

      <div data-fragment="footer"></div>
    </main>
  </body>
</html>
