<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
      ARTAN.LIVE · PUBLICATIONS
      File: docs/publications/index.html
      Purpose: Secondary public hub page.
    ========================================================== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Books, published works, ORCID references, and selected public writing by Artan." />
    <meta name="theme-color" content="#f7f7f5" />

    <meta property="og:title" content="Artan · Publications" />
    <meta property="og:description" content="Books, published works, ORCID references, and selected public writing by Artan." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artan.live/publications/" />

    <title>Artan · Publications</title>

    <link rel="canonical" href="https://artan.live/publications/" />
    <link rel="icon" href="../assets/brand/logo/symbol-artan.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../assets/brand/logo/symbol-artan.svg" />
    <link rel="stylesheet" href="../assets/css/core/00-orchestrator/style.css" />
    <script src="../assets/js/core/app.js" type="module" defer></script>
  </head>

  <body class="cv-site" data-page="publications">
    <div data-fragment="navigation"></div>

    <main class="cv-main" id="main-content">
      <section class="cv-page cv-page--article" aria-labelledby="page-title">
        <article class="cv-article">
          <header class="cv-article__header">
            <h1 class="cv-title" id="page-title">Publications</h1>
          </header>

          <section class="cv-publication-controls" aria-label="Publication controls">
            <div class="cv-publication-tabs" aria-label="Publication category">
              <button class="cv-publication-tabs__button" type="button" data-publication-category="books" aria-pressed="true">Books</button>
              <button class="cv-publication-tabs__button" type="button" data-publication-category="essays" aria-pressed="false">Essays</button>
            </div>

            <div class="cv-publication-filter" aria-label="Publication language filter" data-publication-panel="books">
              <span class="cv-publication-filter__icon" aria-hidden="true"></span>
              <button class="cv-publication-filter__button" type="button" data-publication-filter="English" aria-pressed="true">English</button>
              <button class="cv-publication-filter__button" type="button" data-publication-filter="Persian" aria-pressed="false">Persian</button>
            </div>
          </section>

          <div class="cv-publication-list" data-publications-list data-publication-panel="books" aria-label="Selected publications"></div>

          <section class="cv-publication-empty" data-publication-panel="essays" hidden>
            <p>Essays will be added here as selected public works are prepared.</p>
          </section>
        </article>
      </section>

      <div data-fragment="footer"></div>
    </main>
    <section class="cv-publication-preview-overlay" data-publication-preview-overlay hidden aria-hidden="true" aria-label="Publication preview">
      <button class="global-close-button" type="button" data-publication-preview-close aria-label="Close preview">
        <span class="global-close-button__line global-close-button__line--first" aria-hidden="true"></span>
        <span class="global-close-button__line global-close-button__line--second" aria-hidden="true"></span>
      </button>
      <article class="cv-publication-preview-overlay__reader" data-publication-preview-reader></article>
    </section>
  </body>
</html>
